name: Build Docker Image

# Builds the PaperlessMCP container and publishes it to GitHub Container Registry (GHCR).
# Pull requests build the image as a validation check but never push.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid redundant builds when commits are pushed in quick succession.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  # Image name resolves to ghcr.io/<owner>/paperlessmcp (owner is lowercased by metadata-action).
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/paperlessmcp

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR with GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve a valid .NET semver for the image build-arg / OCI version label.
      # metadata-action's version output is "latest" on the default branch, which
      # dotnet rejects, so derive it explicitly: the tag for v* builds, else version.json.
      - name: Resolve build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(jq -r .version version.json)" >> "$GITHUB_OUTPUT"
          fi

      # Generate image tags/labels from git context:
      #   - semver tags  (1.2.3, 1.2) when a v* tag is pushed
      #   - latest       on the default branch
      #   - <short-sha>  always, for traceability
      #   - pr-NN        on pull requests (build-only)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=pr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in / push when this is NOT a pull request.
      # PRs from forks cannot receive a writable GITHUB_TOKEN, so we build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # The Dockerfile lives in PaperlessMCP/ and COPYs relative to that directory,
          # so the build context must be PaperlessMCP/ (matches the existing Kaniko build).
          context: ./PaperlessMCP
          file: ./PaperlessMCP/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
