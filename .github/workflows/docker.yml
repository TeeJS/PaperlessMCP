name: Build Docker Image

# Builds the PaperlessMCP container and publishes it to GitHub Container Registry (GHCR).
# Pull requests build the image as a validation check but never push.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid redundant builds when commits are pushed in quick succession.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  # Image name resolves to ghcr.io/<owner>/paperlessmcp (owner is lowercased by metadata-action).
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/paperlessmcp

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR with GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Resolve a valid .NET semver for the image build-arg / OCI version label.
      # metadata-action's version output is "latest" on the default branch, which
      # dotnet rejects, so derive it explicitly: the tag for v* builds, else version.json.
      - name: Resolve build version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(jq -r .version version.json)" >> "$GITHUB_OUTPUT"
          fi

      # Generate image tags/labels from git context:
      #   - semver tags  (1.2.3, 1.2) when a v* tag is pushed
      #   - latest       on the default branch
      #   - <short-sha>  always, for traceability
      #   - pr-NN        on pull requests (build-only)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=pr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only log in / push when this is NOT a pull request.
      # PRs from forks cannot receive a writable GITHUB_TOKEN, so we build only.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # mcr.microsoft.com intermittently rate-limits anonymous base-image pulls from
      # GitHub's shared runner IPs (HTTP 401/429), which otherwise fails the whole build.
      # Retry the buildx invocation with backoff so a transient burst self-heals. Raw
      # `docker buildx build` (instead of build-push-action) keeps the retry loop
      # first-party and dependency-free; the trade-off is dropping the gha layer cache,
      # which is cheap here since the build is short. Context is ./PaperlessMCP because
      # the Dockerfile COPYs relative to that directory.
      - name: Build and push (with retry for transient registry rate limits)
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
          VERSION: ${{ steps.version.outputs.value }}
          PUSH: ${{ github.event_name != 'pull_request' }}
        run: |
          args=()
          while IFS= read -r t; do [ -n "$t" ] && args+=(--tag "$t"); done <<< "$TAGS"
          while IFS= read -r l; do [ -n "$l" ] && args+=(--label "$l"); done <<< "$LABELS"
          # Docker media types (not OCI) so Unraid's update check can read the manifest
          [ "$PUSH" = "true" ] && args+=(--output "type=image,oci-mediatypes=false,push=true")

          for attempt in 1 2 3 4; do
            echo "::group::docker buildx build (attempt $attempt)"
            if docker buildx build \
                 --file ./PaperlessMCP/Dockerfile \
                 --build-arg "VERSION=$VERSION" \
                 --provenance=false \
                 "${args[@]}" \
                 ./PaperlessMCP; then
              echo "::endgroup::"
              echo "build succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt 4 ]; then
              delay=$((attempt * 60))
              echo "attempt $attempt failed (transient registry error?); retrying in ${delay}s"
              sleep "$delay"
            fi
          done
          echo "build failed after 4 attempts"
          exit 1
